name: 🔄 Auto Keep Alive (60天续期)

on:
  schedule:
    - cron: "0 0 */50 * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: 自动空提交续期
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git commit --allow-empty -m "chore: keep alive 自动续期"
          git push
